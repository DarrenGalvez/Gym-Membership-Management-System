<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workout Schedule</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Workout Schedule</h1>

 <form id="sessionForm">

  <input id="memberName" placeholder="Member Name" required>
  <input id="trainerName" placeholder="Trainer Name" required>

  <input type="date" id="date" required>
  <input type="time" id="time" required>
  <input id="workoutType" placeholder="Workout Type" required>

  <button type="submit">Add</button>
</form>

  <!-- SEARCH -->
  <div style="margin-top: 10px;">
    <input id="searchName" placeholder="Search by Member Name">
    <button id="searchBtn">Search</button>
  </div>

  <!-- OUTPUT -->
  <div id="scheduleOutput"></div>
</div>

<!-- SEARCH RESULTS TABLE -->
<table id="resultsTable" border="1" style="margin-top: 15px; width: 100%; display: none;">
  <thead>
    <tr>
      <th>Member</th>
      <th>Trainer</th>
      <th>Date</th>
      <th>Time</th>
      <th>Workout</th>
    </tr>
  </thead>

  <tbody id="resultsBody"></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
